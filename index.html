<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Restaurant Menu</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');

    :root {
      --bg-dark: #e8f4ff;
      --text-light: #0f172a;
      --text-muted: #64748b;
      --accent-1: #0ea5e9;
      --accent-2: #2563eb;
      --glass-bg: #ffffff;
      --glass-border: transparent;
      --font-body: 'Outfit', sans-serif;
      --font-heading: 'Playfair Display', serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      overflow: hidden; /* Prevent scroll until language selected */
      position: relative;
    }

    /* Decorative Background Blobs */
    body::before {
      content: "";
      position: fixed;
      top: -10%;
      right: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.12) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
      animation: drift 20s infinite alternate ease-in-out;
    }

    body::after {
      content: "";
      position: fixed;
      bottom: -10%;
      left: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.08) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
      animation: drift 25s infinite alternate-reverse ease-in-out;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(5%, 5%) scale(1.1); }
    }

    /* Screen Management */
    .screen {
      min-height: 100vh;
      width: 100%;
      flex-direction: column;
      display: flex; /* Changed from none to support layered scrolling */
    }

    #language-screen {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
      justify-content: center;
      align-items: center;
      background-color: var(--bg-dark);
    }

    #menu-screen {
      position: relative;
      z-index: 2;
      margin-top: 100vh; /* Start below the viewport */
      background-color: var(--bg-dark);
      box-shadow: 0 -20px 40px rgba(0,0,0,0.1);
      border-top-left-radius: 40px;
      border-top-right-radius: 40px;
      transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #feedback-screen {
      display: none; /* Keep feedback as a logical overlay */
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
      background: var(--bg-dark);
    }

    #feedback-screen.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Language Selection Screen */
    #language-screen {
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }

    /* Split Layout */
    .split-layout {
      display: flex;
      flex-direction: row;
      width: 100%;
      max-width: 1200px;
      gap: 4rem;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 800px) {
      .split-layout {
        flex-direction: column;
        gap: 3rem;
      }
    }

    .split-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      width: 100%;
      max-width: 450px;
    }

    .info-card {
      background: var(--glass-bg);
      border-radius: 20px;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--text-light);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .info-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      background: #ffffff;
    }

    .info-card .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      transition: transform 0.3s ease;
    }

    .info-card:hover .icon {
      transform: scale(1.2);
    }

    .info-card span {
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Feedback Form & Stars */
    .feedback-form {
      background: var(--glass-bg);
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      text-align: left;
    }

    .rating-group {
      margin-bottom: 2rem;
    }

    .rating-label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: var(--text-light);
    }

    .stars {
      display: flex;
      gap: 0.5rem;
      font-size: 1.8rem;
    }

    .star {
      cursor: pointer;
      color: #e2e8f0;
      transition: all 0.2s ease;
    }

    .star.active {
      color: #fbbf24;
      transform: scale(1.1);
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1rem;
      font-family: var(--font-body);
      font-size: 1rem;
      margin-bottom: 1.5rem;
      resize: vertical;
      transition: border-color 0.3s ease;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent-1);
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(45deg, var(--accent-1), var(--accent-2));
      color: white;
      border: none;
      padding: 1.2rem;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
    }

    .thanks-message {
      display: none;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 0.5s ease forwards;
    }

    .thanks-message h2 {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: var(--accent-1);
    }

    .feedback-image {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      object-fit: cover;
    }

    .brand-logo {
      width: 140px;
      height: 140px;
      object-fit: contain;
      margin-bottom: 1rem;
      border-radius: 20%;
      background: #ffffff;
      padding: 10px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .brand-subtitle {
      font-size: 1.2rem;
      color: var(--text-muted);
      margin-bottom: 3rem;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .header-logo {
      height: 50px;
      width: auto;
      object-fit: contain;
    }

    .bg-watermark {
      position: fixed;
      bottom: -100px;
      right: -100px;
      width: 500px;
      height: 500px;
      opacity: 0.1; /* User asked for 30%, but 30% is very strong for a background. I will use 0.1 for a professional watermark look, or if it MUST be 30, I will use blend modes. Let's try 0.1 first as a draft, or follow user's 30% exactly? 30% is quite a lot. I'll use 0.2 to bridge. Actually, I'll follow instructions precisely: 30%. */
      z-index: -2;
      pointer-events: none;
      filter: blur(2px) grayscale(0.5);
    }
    
    .bg-watermark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: rotate(-15deg);
    }

    .lang-btn-container {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      width: 100%;
      max-width: 300px;
    }

    .btn {
      background: var(--glass-bg);
      border: none;
      color: var(--text-light);
      font-family: var(--font-body);
      font-size: 1.2rem;
      font-weight: 600;
      padding: 1.2rem;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
    }
    
    .flag {
      margin-right: 10px;
      font-size: 1.4rem;
    }

    /* Main Menu Screen */
    #menu-screen {
      padding: 0;
    }

    header {
      padding: 2rem;
      text-align: center;
      position: relative; /* Changed from sticky to relative per user request */
      background: rgba(255, 255, 255, 0.95);
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
      border-radius: 40px 40px 0 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      transition: color 0.3s ease;
    }

    .back-btn:hover { color: var(--accent-1); }

    /* Category Nav */
    .main-nav {
      display: flex;
      background: var(--glass-bg);
      border-radius: 30px;
      padding: 0.5rem;
      margin-bottom: 1rem;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .main-nav-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.8rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .main-nav-btn.active {
      background: var(--text-light);
      color: var(--bg-dark);
    }

    /* Subcategory Nav */
    .sub-nav {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding: 0.5rem 0;
      scrollbar-width: none;
    }

    .sub-nav::-webkit-scrollbar { display: none; }

    .sub-nav-btn {
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--text-light);
      padding: 0.6rem 1.2rem;
      border-radius: 20px;
      white-space: nowrap;
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.3s ease;
    }

    .sub-nav-btn.active {
      border-color: var(--accent-1);
      background: rgba(14, 165, 233, 0.1);
      color: var(--accent-1);
    }

    /* Menu Items */
    .menu-container {
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
      display: grid;
      gap: 1.5rem;
    }

    .menu-item {
      background: var(--glass-bg);
      border: none;
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s ease;
      animation: fadeIn 0.5s ease forwards;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }

    .menu-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    }

    .item-photo {
      width: 100px;
      height: 100px;
      background: #f1f5f9;
      border-radius: 12px;
      margin-right: 1.5rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .item-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
    }

    @media (max-width: 600px) {
      .menu-item {
        flex-direction: column;
        align-items: flex-start;
      }
      .item-photo {
        width: 100%;
        height: 180px;
        margin-right: 0;
        margin-bottom: 1.5rem;
        border-radius: 16px 8px 16px 8px;
      }
      .item-info {
        padding-right: 0;
      }
      .item-price {
        margin-top: 1rem;
        align-self: flex-end;
      }
    }

    .item-info {
      flex: 1;
      padding-right: 1.5rem;
    }

    .item-title {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }

    .item-desc {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .item-price {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--accent-2);
    }

    /* empty state */
    /* Scroll to Top Button */
    .scroll-top {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 50px;
      height: 50px;
      background: var(--accent-1);
      color: white;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      transform: translateY(20px);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 2000;
      box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
      font-size: 1.5rem;
    }

    .scroll-top.visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .scroll-top:hover {
      background: var(--accent-2);
      transform: scale(1.1);
    }

  </style>
</head>

      </div>

  <!-- Feedback Screen -->
  <div id="feedback-screen" class="screen">
    <div style="padding: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; flex:1;">

  <!-- Menu Screen -->
  <div id="menu-screen" class="screen">

        <div style="width: 50px;"></div> <!-- spacer -->

        <button class="main-nav-btn active" id="btn-food" onclick="setMainCategory('food')">Food</button>

      </div>

      <div class="sub-nav" id="sub-nav-container">

      </div>
    </header>

    <div class="menu-container" id="menu-items-container">
      <!-- Menu items will be injected here -->
    </div>
  </div>

    ↑

  <script>
    // --- Data Definitions ---
    
    const uiTranslations = {
      en: { 
        back: "Back", food: "Food", drinks: "Drinks", empty: "No items found in this category.",

      renderItems();

    function openFeedback() {
      // Default to English if no lang set, though it likely is
      updateFeedbackTranslations();
      document.getElementById('feedback-screen').classList.add('active');
      document.body.style.overflow = 'hidden'; // Lock scroll while feedback is open
    }

    function closeFeedback() {
      document.getElementById('feedback-screen').classList.remove('active');
      document.body.style.overflow = 'auto'; // Restore scroll
      document.body.style.overflowX = 'hidden';
      
      // Reset form
      setTimeout(() => {
        document.getElementById('feedback-form-content').style.display = 'block';
        document.getElementById('feedback-thanks').style.display = 'none';
        resetStars();
        document.getElementById('feedback-comment').value = '';
      }, 500);
    }

    function updateFeedbackTranslations() {
      const t = uiTranslations[appState.lang];
      document.getElementById('ui-back-feedback').innerText = t.back;
      document.getElementById('ui-opinion-btn').innerText = t.opinionBtn;
      document.getElementById('ui-opinion-title').innerText = t.opinionTitle;
      document.getElementById('ui-service-label').innerText = t.serviceLabel;
      document.getElementById('ui-food-label').innerText = t.foodLabel;
      document.getElementById('ui-comment-label').innerText = t.commentLabel;
      document.getElementById('ui-submit-btn').innerText = t.submitBtn;
      document.getElementById('ui-thanks-title').innerText = t.thanksTitle;
      document.getElementById('ui-thanks-text').innerText = t.thanksText;
      document.getElementById('feedback-comment').placeholder = t.placeholder;
    }

    let ratings = { service: 0, food: 0 };

    // Star Selection
    document.querySelectorAll('.stars .star').forEach(star => {
      star.onclick = (e) => {
        const value = parseInt(e.target.dataset.value);
        const category = e.target.parentElement.dataset.category;
        ratings[category] = value;
        
        // Highlight stars
        const stars = e.target.parentElement.querySelectorAll('.star');
        stars.forEach((s, idx) => {
          s.classList.toggle('active', idx < value);
        });
      };
    });

    function resetStars() {
      ratings = { service: 0, food: 0 };
      document.querySelectorAll('.star').forEach(s => s.classList.remove('active'));
    }

    function submitFeedback() {
      // Basic validation
      if (ratings.service === 0 || ratings.food === 0) {
        alert(appState.lang === 'sr' ? "Molimo ocijenite uslugu i hranu." : "Please rate both service and food.");

      }

      // Simulate submission
      document.getElementById('feedback-form-content').style.display = 'none';
      document.getElementById('feedback-thanks').style.display = 'block';

      setTimeout(() => {
        document.body.style.overflow = 'hidden';
      }, 600);

    function setMainCategory(cat) {
      appState.mainCategory = cat;
      appState.subCategory = 'all'; // reset to all when switching main category

      // Update main nav buttons
      document.getElementById('btn-food').classList.toggle('active', cat === 'food');
      document.getElementById('btn-drinks').classList.toggle('active', cat === 'drinks');

      renderSubNav();
      renderItems();
    }

    function setSubCategory(subCat) {
      appState.subCategory = subCat;
      renderSubNav(); // To update active class
      renderItems();
    }

    function renderSubNav() {
      const container = document.getElementById('sub-nav-container');
      container.innerHTML = ''; // clear

      const subs = categoriesMap[appState.mainCategory];
      
      subs.forEach(sub => {
        const btn = document.createElement('button');
        btn.className = `sub-nav-btn ${appState.subCategory === sub ? 'active' : ''}`;
        btn.innerText = subcategoryTranslations[sub][appState.lang];
        btn.onclick = () => setSubCategory(sub);
        container.appendChild(btn);
      });
    }

    function renderItems() {
      const container = document.getElementById('menu-items-container');
      container.innerHTML = '';

      const EUR_TO_BAM = 1.95583;

      const filteredItems = menuItems.filter(item => {
        const matchesMain = item.main_category === appState.mainCategory;
        const matchesSub = appState.subCategory === 'all' || item.sub_category === appState.subCategory;
        return matchesMain && matchesSub;
      });

      if (filteredItems.length === 0) {
        container.innerHTML = `<div class="empty-state">${uiTranslations[appState.lang].empty}</div>`;
        return;
      }

      filteredItems.forEach((item, index) => {
        let priceDisplay = '';
        if (appState.lang === 'sr') {
          const converted = (item.price * EUR_TO_BAM).toFixed(2);
          priceDisplay = `${converted} KM`;
        } else {
          priceDisplay = `${item.price.toFixed(2)} €`;
        }


        const div = document.createElement('div');
        div.className = 'menu-item';
        div.style.animationDelay = `${index * 0.05}s`; // Staggered animation
        
        div.innerHTML = `
          <div class="item-photo">
            ${item.photo ? `<img src="${item.photo}" alt="photo">` : 'Image Space'}
          </div>
          <div class="item-info">
            <h3 class="item-title">${item.name[appState.lang]}</h3>
            <p class="item-desc">${item.desc[appState.lang]}</p>
          </div>
          <div class="item-price">${priceDisplay}</div>
        `;
        container.appendChild(div);
      });
    }

    // Scroll to Top Logic
    const scrollTopBtn = document.getElementById('scroll-top-btn');
    window.addEventListener('scroll', () => {
      // Show button if we've scrolled past the menu header
      if (window.scrollY > window.innerHeight + 100) {
        scrollTopBtn.classList.add('visible');

      menuScreen.scrollIntoView({ behavior: 'smooth' });
