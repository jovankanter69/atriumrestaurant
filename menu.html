<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Restaurant Menu</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');

    :root {
      --bg-dark: #e8f4ff;
      --text-light: #0f172a;
      --text-muted: #64748b;
      --accent-1: #0ea5e9;
      --accent-2: #2563eb;
      --glass-bg: #ffffff;
      --glass-border: transparent;
      --font-body: 'Outfit', sans-serif;
      --font-heading: 'Playfair Display', serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Decorative Background Blobs */
    body::before {
      content: "";
      position: fixed;
      top: -10%;
      right: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.12) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
      animation: drift 20s infinite alternate ease-in-out;
    }

    body::after {
      content: "";
      position: fixed;
      bottom: -10%;
      left: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.08) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
      animation: drift 25s infinite alternate-reverse ease-in-out;
    }

    @keyframes drift {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(5%, 5%) scale(1.1);
      }
    }

    /* Screen Management */
    .screen {
      display: none;
      min-height: 100vh;
      width: 100%;
      flex-direction: column;
      animation: fadeIn 0.8s ease forwards;
    }

    .screen.active {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Splash Screen Styles */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100dvh;
      background: linear-gradient(135deg, #ffffff 0%, var(--bg-dark) 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
    }

    #splash-screen.slide-up {
      transform: translateY(-100%);
    }

    .splash-logo-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 80vw;
      animation: logoEntrance 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .splash-logo {
      width: 200px;
      max-width: 100%;
      height: auto;
      aspect-ratio: 1/1;
      object-fit: contain;
      background: white;
      padding: 20px;
      border-radius: 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
    }

    @keyframes logoEntrance {
      from {
        opacity: 0;
        transform: scale(0.8) translateY(30px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .splash-loader {
      margin-top: 2rem;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(14, 165, 233, 0.1);
      border-top: 3px solid var(--accent-1);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Language Selection Screen */
    #language-screen {
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }

    /* Split Layout */
    .split-layout {
      display: flex;
      flex-direction: row;
      width: 100%;
      max-width: 1200px;
      gap: 4rem;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 800px) {
      .split-layout {
        flex-direction: column;
        gap: 3rem;
      }
    }

    .split-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      width: 100%;
      max-width: 450px;
    }

    .info-card {
      background: var(--glass-bg);
      border-radius: 20px;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--text-light);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .info-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      background: #ffffff;
    }

    .info-card .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      transition: transform 0.3s ease;
    }

    .info-card:hover .icon {
      transform: scale(1.2);
    }

    .info-card span {
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Sticker Specific Styles */
    .sticker-card {
      position: relative;
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.05);
      transform: rotate(-1.5deg);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .sticker-card:nth-child(even) {
      transform: rotate(2deg);
    }

    .sticker-card:hover {
      transform: translateY(-10px) rotate(0deg) scale(1.05) !important;
      box-shadow: 10px 15px 30px rgba(0, 0, 0, 0.1);
      z-index: 10;
    }

    .sticker-card.phone {
      border-left: 6px solid #0095f6;
    }

    .sticker-card.review {
      border-left: 6px solid #fbbf24;
    }

    .sticker-card.instagram {
      border-left: 6px solid #E1306C;
    }

    .sticker-card.opinion {
      border-left: 6px solid #2563eb;
    }

    /* Feedback Form & Stars */
    .feedback-form {
      background: var(--glass-bg);
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
      text-align: left;
    }

    .rating-group {
      margin-bottom: 2rem;
    }

    .rating-label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: var(--text-light);
    }

    .stars {
      display: flex;
      gap: 0.5rem;
      font-size: 1.8rem;
    }

    .star {
      cursor: pointer;
      color: #e2e8f0;
      transition: all 0.2s ease;
    }

    .star.active {
      color: #fbbf24;
      transform: scale(1.1);
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1rem;
      font-family: var(--font-body);
      font-size: 1rem;
      margin-bottom: 1.5rem;
      resize: vertical;
      transition: border-color 0.3s ease;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent-1);
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(45deg, var(--accent-1), var(--accent-2));
      color: white;
      border: none;
      padding: 1.2rem;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
    }

    .thanks-message {
      display: none;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 0.5s ease forwards;
    }

    .thanks-message h2 {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: var(--accent-1);
    }

    .feedback-image {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      object-fit: cover;
    }

    .brand-logo {
      width: 140px;
      height: 140px;
      object-fit: contain;
      margin-bottom: 1rem;
      border-radius: 20%;
      background: #ffffff;
      padding: 10px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .brand-subtitle {
      font-size: 1.2rem;
      color: var(--text-muted);
      margin-bottom: 3rem;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .header-logo {
      height: 50px;
      width: auto;
      object-fit: contain;
    }

    .bg-watermark {
      position: fixed;
      bottom: -100px;
      right: -100px;
      width: 500px;
      height: 500px;
      opacity: 0.1;
      /* User asked for 30%, but 30% is very strong for a background. I will use 0.1 for a professional watermark look, or if it MUST be 30, I will use blend modes. Let's try 0.1 first as a draft, or follow user's 30% exactly? 30% is quite a lot. I'll use 0.2 to bridge. Actually, I'll follow instructions precisely: 30%. */
      z-index: -2;
      pointer-events: none;
      filter: blur(2px) grayscale(0.5);
    }

    .bg-watermark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: rotate(-15deg);
    }

    .lang-btn-container {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      width: 100%;
      max-width: 300px;
    }

    .btn {
      background: var(--glass-bg);
      border: none;
      color: var(--text-light);
      font-family: var(--font-body);
      font-size: 1.2rem;
      font-weight: 600;
      padding: 1.2rem;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
    }

    .flag {
      margin-right: 10px;
      font-size: 1.4rem;
    }

    /* Main Menu Screen */
    #menu-screen {
      padding: 0;
    }

    header {
      padding: 2rem;
      text-align: center;
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      transition: color 0.3s ease;
    }

    .back-btn:hover {
      color: var(--accent-1);
    }

    /* Category Nav */
    .main-nav {
      display: flex;
      background: var(--glass-bg);
      border-radius: 30px;
      padding: 0.5rem;
      margin-bottom: 1rem;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .main-nav-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.8rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .main-nav-btn.active {
      background: var(--text-light);
      color: var(--bg-dark);
    }

    /* Subcategory Nav */
    .sub-nav {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding: 0.5rem 0;
      scrollbar-width: none;
    }

    .sub-nav::-webkit-scrollbar {
      display: none;
    }

    .sub-nav-btn {
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--text-light);
      padding: 0.6rem 1.2rem;
      border-radius: 20px;
      white-space: nowrap;
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.3s ease;
    }

    .sub-nav-btn.active {
      border-color: var(--accent-1);
      background: rgba(14, 165, 233, 0.1);
      color: var(--accent-1);
    }

    /* Menu Items */
    .menu-container {
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
      display: grid;
      gap: 1.5rem;
    }

    .menu-item {
      background: var(--glass-bg);
      border: none;
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s ease;
      animation: fadeIn 0.5s ease forwards;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }

    .menu-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    }

    .item-photo {
      width: 100px;
      height: 100px;
      background: #f1f5f9;
      border-radius: 12px;
      margin-right: 1.5rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .item-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
    }

    @media (max-width: 600px) {
      .menu-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .item-photo {
        width: 100%;
        height: auto;
        aspect-ratio: 4 / 3;
        margin-right: 0;
        margin-bottom: 1.5rem;
        border-radius: 16px 8px 16px 8px;
      }

      .item-info {
        padding-right: 0;
      }

      .item-price {
        margin-top: 1rem;
        align-self: flex-end;
      }
    }

    .item-info {
      flex: 1;
      padding-right: 1.5rem;
    }

    .item-title {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }

    .item-desc {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .item-price {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--accent-2);
    }

    /* empty state */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(8px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 3000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      display: flex;
      opacity: 1;
    }

    .modal-content {
      background: white;
      border-radius: 32px;
      max-width: 90%;
      max-height: 90vh;
      width: 500px;
      position: relative;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow-y: auto;
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    .modal-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: #f1f5f9;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      color: var(--text-muted);
      transition: all 0.2s ease;
      z-index: 10;
    }

    #image-modal .modal-content {
      padding: 0;
      width: 90%;
      max-width: 400px;
      background: transparent;
      box-shadow: none;
    }

    #image-modal img {
      width: auto;
      max-width: 100%;
      max-height: 80vh;
      border-radius: 24px;
      display: block;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>

            class="info-card sticker-card review">
            <div class="icon">⭐</div>
            <span id="ui-review-btn">Ocijenite nas na Google-u</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Feedback Screen -->
  <div id="feedback-screen" class="screen">
    <div
      style="padding: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; flex:1;">
      <button class="back-btn" onclick="closeFeedback()" style="align-self: flex-start; margin-bottom: 2rem;">
        ← <span id="ui-back-feedback">Nazad</span>
      </button>

      <div class="feedback-form" id="feedback-form-content">
        <h2 class="brand-title" id="ui-opinion-title"
          style="font-size: 2.2rem; margin-bottom: 1.5rem; text-align: center;">Vaši utisci</h2>

        <div class="rating-group">
          <label class="rating-label" id="ui-service-label">Kvalitet usluge</label>
          <div class="stars" data-category="service">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
          </div>
        </div>

        <div class="rating-group">
          <label class="rating-label" id="ui-food-label">Kvalitet hrane</label>
          <div class="stars" data-category="food">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
          </div>
        </div>

        <label class="rating-label" id="ui-comment-label">Vaš komentar</label>
        <textarea id="feedback-comment" placeholder="Recite nam više..."></textarea>

        <button class="submit-btn" onclick="submitFeedback()" id="ui-submit-btn">Pošaljite utisak</button>
      </div>

      <div class="thanks-message" id="feedback-thanks">
        <div class="icon" style="font-size: 4rem; margin-bottom: 1rem;">✨</div>
        <h2 id="ui-thanks-title">Hvala Vam!</h2>
        <p id="ui-thanks-text" style="color: var(--text-muted);">Vaši utisci nam pomažu da budemo bolji.</p>
        <button class="btn" onclick="closeFeedback()" style="margin-top: 2rem; padding: 1rem 2rem;">Zatvori</button>
      </div>

    </div>
  </div>

  <!-- Menu Screen -->
  <div id="menu-screen" class="screen">
    <header>
      <div class="header-top">
        <button class="back-btn" onclick="goBack()">
          ← <span id="ui-back">Back</span>
        </button>
        <img src="images (1).jpg" alt="Atrium Logo" class="header-logo">
        <div style="width: 50px;"></div> <!-- spacer -->
      </div>

      <div class="main-nav">
        <button class="main-nav-btn active" id="btn-food" onclick="setMainCategory('food')">Food</button>
        <button class="main-nav-btn" id="btn-drinks" onclick="setMainCategory('drinks')">Drinks</button>
      </div>

      <div class="sub-nav" id="sub-nav-container">
        <!-- Subcategories will be injected here -->
      </div>
    </header>

    <div class="menu-container" id="menu-items-container">
      <!-- Menu items will be injected here -->
    </div>

    <!-- Image Modal -->
    <div id="image-modal" class="modal-overlay" onclick="closeModals()">
      <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModals()">✕</button>
        <img id="modal-img" src="" alt="Zoomed Image">
      </div>
    </div>
  </div>

  <div class="bg-watermark" style="opacity: 0.3;">
    <img src="images (1).jpg" alt="">
  </div>

  <script>
    // --- Data Definitions ---

    const uiTranslations = {
      en: {
        back: "Back", food: "Food", drink: "Drink", empty: "No items found in this category.",
        opinionBtn: "Leave us your opinion", opinionTitle: "Feedback", serviceLabel: "Service Quality",
        foodLabel: "Food Quality", commentLabel: "Your Comment", submitBtn: "Submit Feedback",
        thanksTitle: "Thank You!", thanksText: "Your feedback helps us grow.", placeholder: "Tell us more...",
        callUs: "Call Us", rateUs: "Rate us on Google"
      },
      de: {
        back: "Zurück", food: "Essen", drink: "Getränke", empty: "Keine Artikel in dieser Kategorie gefunden.",
        opinionBtn: "Deine Meinung hinterlassen", opinionTitle: "Feedback", serviceLabel: "Servicequalität",
        foodLabel: "Essenqualität", commentLabel: "Dein Kommentar", submitBtn: "Feedback absenden",
        thanksTitle: "Vielen Dank!", thanksText: "Dein Feedback hilft uns zu wachsen.", placeholder: "Erzähl uns mehr...",
        callUs: "Rufen Sie uns an", rateUs: "Bewerten Sie uns bei Google"
      },
      sr: {
        back: "Nazad", food: "Hrana", drink: "Piće", empty: "Nema artikala u ovoj kategoriji.",
        opinionBtn: "Ostavite nam vaše mišljenje", opinionTitle: "Utisci", serviceLabel: "Kvalitet usluge",
        foodLabel: "Kvalitet hrane", commentLabel: "Vaš komentar", submitBtn: "Pošaljite utisak",
        thanksTitle: "Hvala Vam!", thanksText: "Vaši utisci nam pomažu da budemo bolji.", placeholder: "Recite nam više...",
        callUs: "Pozovite nas", rateUs: "Ocijenite nas na Google-u"
      }
    };

    const subcategoryTranslations = {
      all: { en: "All", de: "Alle", sr: "Sve" },
      grilled: { en: "Grilled", de: "Gegrillt", sr: "Sa roštilja" },
      cooked: { en: "Cooked", de: "Gekocht", sr: "Kuvana jela" },
      coffee: { en: "Coffee", de: "Kaffee", sr: "Kafa" },
      juices: { en: "Juices", de: "Säfte", sr: "Sokovi" },
      natural_juices: { en: "Natural Juices", de: "Natürliche Säfte", sr: "Prirodni sokovi" },
      alcohol: { en: "Alcohol", de: "Alkohol", sr: "Alkoholna pića" }
    };

    // Helper specific to categories mapping
    const categoriesMap = {
      food: ['all', 'grilled', 'cooked'],
      drinks: ['all', 'coffee', 'juices', 'natural_juices', 'alcohol']
    };

    const menuItems = [
      // FOOD - GRILLED
      {
        main_category: 'food', sub_category: 'grilled', price: 18.00,
        photo: 'images/ribeye.jpg',
        name: { en: 'Grilled Ribeye Steak', de: 'Gegrilltes Ribeye-Steak', sr: 'Ramstek sa roštilja' },
        desc: {
          en: 'Premium cut beef with garlic butter and rosemary.',
          de: 'Premium-Rindfleisch mit Knoblauchbutter und Rosmarin.',
          sr: 'Premium komad govedine sa puterom od bijelog luka i ruzmarinom.'
        }
      },
      {
        main_category: 'food', sub_category: 'grilled', price: 12.00,
        photo: 'images/breast.jpg',
        name: { en: 'Grilled Chicken Breast', de: 'Gegrillte Hähnchenbrust', sr: 'Piletina sa roštilja' },
        desc: {
          en: 'Served with seasonal grilled vegetables.',
          de: 'Serviert mit saisonalem gegrilltem Gemüse.',
          sr: 'Služeno sa sezonskim grilovanim povrćem.'
        }
      },
      // FOOD - COOKED
      {
        main_category: 'food', sub_category: 'cooked', price: 14.50,
        photo: 'images/beef stew.jpg',
        name: { en: 'Traditional Beef Stew', de: 'Traditioneller Rindereintopf', sr: 'Tradicionalni goveđi gulaš' },
        desc: {
          en: 'Slow-cooked for 8 hours with root vegetables.',
          de: '8 Stunden langsam mit Wurzelgemüse gekocht.',
          sr: 'Kuvano polako 8 sati posluženo uz povrće.'
        }
      },
      {
        main_category: 'food', sub_category: 'cooked', price: 10.00,
        photo: 'images/tomato.jpg',
        name: { en: 'Creamy Tomato Soup', de: 'Cremige Tomatensuppe', sr: 'Krem čorba od paradajza' },
        desc: {
          en: 'Homemade soup with fresh basil and croutons.',
          de: 'Hausgemachte Suppe mit frischem Basilikum und Croutons.',
          sr: 'Domaća čorba sa svježim bosiljkom i krutonima.'
        }
      },
      // DRINKS - COFFEE
      {
        main_category: 'drinks', sub_category: 'coffee', price: 2.50,
        photo: 'images/espresso.jpg',
        name: { en: 'Espresso', de: 'Espresso', sr: 'Espreso' },
        desc: { en: 'Rich and intense.', de: 'Reichhaltig und intensiv.', sr: 'Snažan i intenzivan ukus.' }
      },
      {
        main_category: 'drinks', sub_category: 'coffee', price: 3.50,
        photo: 'images/cappucino.jpg',
        name: { en: 'Cappuccino', de: 'Cappuccino', sr: 'Kapućino' },
        desc: { en: 'Espresso with steamed milk foam.', de: 'Espresso mit aufgeschäumter Milch.', sr: 'Espreso sa pjenom od mlijeka.' }
      },
      // DRINKS - JUICES
      {
        main_category: 'drinks', sub_category: 'juices', price: 3.00,
        photo: 'images/cocacola.jpg',
        name: { en: 'Coca-Cola', de: 'Coca-Cola', sr: 'Koka-kola' },
        desc: { en: '0.33l Bottle', de: '0.33l Flasche', sr: 'Flašica 0.33l' }
      },
      // DRINKS - NATURAL JUICES
      {
        main_category: 'drinks', sub_category: 'natural_juices', price: 4.50,
        photo: 'images/orange.jpg',
        name: { en: 'Fresh Orange Juice', de: 'Frischer Orangensaft', sr: 'Svježe cijeđena narandža' },
        desc: { en: '100% freshly squeezed.', de: '100% frisch gepresst.', sr: '100% svježe cijeđeno.' }
      },
      {
        main_category: 'drinks', sub_category: 'natural_juices', price: 4.50,
        photo: 'images/lemonade.jpg',
        name: { en: 'Lemonade', de: 'Limonade', sr: 'Limunada' },
        desc: { en: 'Fresh lemons, mint, ice.', de: 'Frische Zitronen, Minze, Eis.', sr: 'Svjež limun, nana i led.' }
      },
      // DRINKS - ALCOHOL
      {
        main_category: 'drinks', sub_category: 'alcohol', price: 6.00,
        photo: 'images/beer.jpg',
        name: { en: 'Craft Beer', de: 'Craft Bier', sr: 'Zanatsko Pivo' },
        desc: { en: 'Local Pale Ale, 0.5l', de: 'Lokales Pale Ale, 0.5l', sr: 'Lokalno svijetlo pivo, 0.5l' }
      },
      {
        main_category: 'drinks', sub_category: 'alcohol', price: 25.00,
        photo: 'images/souvignon.jpg',
        name: { en: 'Cabernet Sauvignon', de: 'Cabernet Sauvignon', sr: 'Kaberne Sovinjon' },
        desc: { en: 'Bottle 0.75l, Premium Red Wine', de: 'Flasche 0.75l, Premium Rotwein', sr: 'Flaša 0.75l, Vrhunsko crveno vino' }
      }
    ];

    // --- State ---
    let appState = {
      lang: 'sr',
      mainCategory: 'food',
      subCategory: 'all'
    };


    // --- Functions ---

    function selectLanguage(langCode) {
      appState.lang = langCode;

      // Update UI translations
      document.getElementById('ui-back').innerText = uiTranslations[langCode].back;
      document.getElementById('btn-food').innerText = uiTranslations[langCode].food;
      document.getElementById('btn-drinks').innerText = uiTranslations[langCode].drink;

      // Stickers logic
      document.getElementById('ui-call-btn').innerText = uiTranslations[langCode].callUs;
      document.getElementById('ui-review-btn').innerText = uiTranslations[langCode].rateUs;

      // Switch screens
      document.getElementById('language-screen').classList.remove('active');
      document.getElementById('menu-screen').classList.add('active');

      // Update Feedback Screen just in case
      updateFeedbackTranslations();

      // Render Everything
      renderSubNav();
      renderItems();
    }

    function openFeedback() {
      // Default to English if no lang set, though it likely is
      updateFeedbackTranslations();
      document.getElementById('language-screen').classList.remove('active');
      document.getElementById('feedback-screen').classList.add('active');
    }

    function closeFeedback() {
      document.getElementById('feedback-screen').classList.remove('active');
      document.getElementById('language-screen').classList.add('active');

      // Reset form
      setTimeout(() => {
        document.getElementById('feedback-form-content').style.display = 'block';
        document.getElementById('feedback-thanks').style.display = 'none';
        resetStars();
        document.getElementById('feedback-comment').value = '';
      }, 500);
    }

    function updateFeedbackTranslations() {
      const t = uiTranslations[appState.lang];
      document.getElementById('ui-back-feedback').innerText = t.back;
      document.getElementById('ui-opinion-btn').innerText = t.opinionBtn;
      document.getElementById('ui-opinion-title').innerText = t.opinionTitle;
      document.getElementById('ui-service-label').innerText = t.serviceLabel;
      document.getElementById('ui-food-label').innerText = t.foodLabel;
      document.getElementById('ui-comment-label').innerText = t.commentLabel;
      document.getElementById('ui-submit-btn').innerText = t.submitBtn;
      document.getElementById('ui-thanks-title').innerText = t.thanksTitle;
      document.getElementById('ui-thanks-text').innerText = t.thanksText;
      document.getElementById('feedback-comment').placeholder = t.placeholder;
    }

    let ratings = { service: 0, food: 0 };

    // Star Selection
    document.querySelectorAll('.stars .star').forEach(star => {
      star.onclick = (e) => {
        const value = parseInt(e.target.dataset.value);
        const category = e.target.parentElement.dataset.category;
        ratings[category] = value;

        // Highlight stars
        const stars = e.target.parentElement.querySelectorAll('.star');
        stars.forEach((s, idx) => {
          s.classList.toggle('active', idx < value);
        });
      };
    });

    function resetStars() {
      ratings = { service: 0, food: 0 };
      document.querySelectorAll('.star').forEach(s => s.classList.remove('active'));
    }

    function submitFeedback() {
      // Basic validation
      if (ratings.service === 0 || ratings.food === 0) {
        alert(appState.lang === 'sr' ? "Molimo ocijenite uslugu i hranu." : "Please rate both service and food.");
        return;
      }

      // Simulate submission
      document.getElementById('feedback-form-content').style.display = 'none';
      document.getElementById('feedback-thanks').style.display = 'block';
    }

    function goBack() {
      document.getElementById('menu-screen').classList.remove('active');
      document.getElementById('language-screen').classList.add('active');
    }

    function openImageModal(src) {
      const modal = document.getElementById('image-modal');
      const img = document.getElementById('modal-img');
      img.src = src;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModals() {
      document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
      document.body.style.overflow = 'auto';
      document.body.style.overflowX = 'hidden';
    }

    function setMainCategory(cat) {
      appState.mainCategory = cat;
      appState.subCategory = 'all'; // reset to all when switching main category

      // Update main nav buttons
      document.getElementById('btn-food').classList.toggle('active', cat === 'food');
      document.getElementById('btn-drinks').classList.toggle('active', cat === 'drinks');

      renderSubNav();
      renderItems();
    }

    function setSubCategory(subCat) {
      appState.subCategory = subCat;
      renderSubNav(); // To update active class
      renderItems();
    }

    function renderSubNav() {
      const container = document.getElementById('sub-nav-container');
      container.innerHTML = ''; // clear

      const subs = categoriesMap[appState.mainCategory];

      subs.forEach(sub => {
        const btn = document.createElement('button');
        btn.className = `sub-nav-btn ${appState.subCategory === sub ? 'active' : ''}`;
        btn.innerText = subcategoryTranslations[sub][appState.lang];
        btn.onclick = () => setSubCategory(sub);
        container.appendChild(btn);
      });
    }

    function renderItems() {
      const container = document.getElementById('menu-items-container');
      container.innerHTML = '';

      const EUR_TO_BAM = 1.95583;

      const filteredItems = menuItems.filter(item => {
        const matchesMain = item.main_category === appState.mainCategory;
        const matchesSub = appState.subCategory === 'all' || item.sub_category === appState.subCategory;
        return matchesMain && matchesSub;
      });

      if (filteredItems.length === 0) {
        container.innerHTML = `<div class="empty-state">${uiTranslations[appState.lang].empty}</div>`;
        return;
      }

      filteredItems.forEach((item, index) => {
        let priceDisplay = '';
        if (appState.lang === 'sr') {
          const converted = (item.price * EUR_TO_BAM).toFixed(2);
          priceDisplay = `${converted} KM`;
        } else {
          priceDisplay = `${item.price.toFixed(2)} €`;
        }


        const div = document.createElement('div');
        div.className = 'menu-item';
        div.style.animationDelay = `${index * 0.05}s`; // Staggered animation

        div.innerHTML = `
          <div class="item-photo" onclick="openImageModal('${item.photo || 'images (1).jpg'}')">
            ${item.photo ? `<img src="${item.photo}" alt="photo">` : '<img src="images (1).jpg" alt="placeholder" style="filter: grayscale(1); opacity: 0.3;">'}
          </div>
          <div class="item-info">
            <h3 class="item-title">${item.name[appState.lang]}</h3>
            <p class="item-desc">${item.desc[appState.lang]}</p>
          </div>
          <div class="item-price">${priceDisplay}</div>
        `;
        container.appendChild(div);
      });
    }

    // Splash Screen Logic
    window.addEventListener('load', () => {
      const splash = document.getElementById('splash-screen');
      const hasSeenSplash = sessionStorage.getItem('hasSeenAtriumSplash');

      if (hasSeenSplash) {
        splash.style.display = 'none';
        document.body.style.overflow = 'auto';
        document.body.style.overflowX = 'hidden';
      } else {
        setTimeout(() => {
          splash.classList.add('slide-up');
          document.body.style.overflow = 'auto';
          document.body.style.overflowX = 'hidden';
          sessionStorage.setItem('hasSeenAtriumSplash', 'true');
          
          // Clean up DOM after animation
          setTimeout(() => {
            splash.style.display = 'none';
          }, 800);
        }, 2000); // Show splash for 2 seconds
      }
    });

  </script>
</body>

</html>
